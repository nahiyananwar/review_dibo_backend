name: Keep Render backend awake

# Render's free web services spin down after ~15 minutes of inactivity, which
# adds a ~50s cold start to the next request. This workflow pings the public
# /health endpoint on a schedule so the service stays warm.
#
# SETUP (one-time):
#   1. Deploy the backend to Render and copy its URL, e.g.
#        https://review-dibo-api.onrender.com
#   2. In this GitHub repo: Settings → Secrets and variables → Actions →
#      Variables → "New repository variable":
#        Name:  BACKEND_URL
#        Value: https://review-dibo-api.onrender.com   (no trailing slash)
#   3. (Optional) Run it once manually: Actions tab → "Keep Render backend
#      awake" → "Run workflow".
#
# NOTE: GitHub's scheduled runs are best-effort and can be delayed under load,
# and on PRIVATE repos these runs consume your Actions minutes. For the most
# reliable keep-alive, also/instead use a free uptime monitor — see the
# "Keep-alive" section in README.md.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (comfortably under Render's 15-min idle window)
  workflow_dispatch: {} # allow manual runs from the Actions tab

# If a new run starts, let it cancel an in-flight one (no point queuing pings).
concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /health (with retries for a possible cold start)
        run: |
          URL="${{ vars.BACKEND_URL }}"
          if [ -z "$URL" ]; then
            echo "::error::Set the BACKEND_URL repository variable (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          echo "Pinging ${URL%/}/health ..."
          # --retry handles the case where the service is mid-wakeup.
          curl -fsS --max-time 90 \
               --retry 5 --retry-delay 15 --retry-all-errors \
               "${URL%/}/health"
          echo ""
          echo "Done."
